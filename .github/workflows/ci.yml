name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Run tests
        run: python -m pytest

  lint:
    name: Lint and package checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install tooling
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy paperless_ngx

      - name: Pylint
        run: pylint paperless_ngx

      - name: Bandit
        run: bandit -c pyproject.toml -r paperless_ngx -x paperless_ngx/tests

      - name: Bytecode compilation
        run: python -m compileall paperless_ngx

      - name: Build distribution
        run: python -m build --no-isolation

      - name: Validate distribution metadata
        run: twine check dist/*

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Build distribution
        run: python -m pip install --upgrade pip build setuptools wheel && python -m build --no-isolation

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: python-dist
          path: dist/*
