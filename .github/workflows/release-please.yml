name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  attestations: write
  id-token: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-binaries:
    name: Build release binary
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          cp target/release/paperless artifacts/paperless-linux-amd64
          chmod +x artifacts/paperless-linux-amd64
          tar czf artifacts/paperless-linux-amd64.tar.gz -C artifacts paperless-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: paperless-linux-amd64
          path: artifacts/paperless-linux-amd64.tar.gz

  github-release:
    name: Create GitHub Release
    needs: [release-please, build-binaries]
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v7

        with:
          path: artifacts

      - name: Generate checksums
        run: |
          find artifacts -name '*.tar.gz' -exec sha256sum {} \; > artifacts/checksums-sha256.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/checksums-sha256.txt

  publish-crate:
    name: Publish to crates.io
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
